{% load static %}
<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connexion</title>
  <link rel="stylesheet" href="{% static 'app.css' %}">
  <style>
    :root {
      --login-bg-1: #d9e8ff;
      --login-bg-2: #d5f3ff;
      --login-bg-3: #dfe4ff;
      --login-bg-4: #e6ecf8;
      --login-ink: #0a1f44;
      --login-muted: #3b537d;
      --login-border: rgba(255, 255, 255, 0.42);
      --login-card: rgba(255, 255, 255, 0.24);
      --login-field: rgba(255, 255, 255, 0.58);
      --login-btn: #0a5bd8;
      --login-btn-hover: #0847aa;
    }

    body.login-page {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      padding: 20px;
      color: var(--login-ink);
      background:
        radial-gradient(1100px 620px at -10% -14%, rgba(26, 115, 232, 0.78) 0%, transparent 62%),
        radial-gradient(980px 560px at 110% -2%, rgba(0, 188, 212, 0.5) 0%, transparent 58%),
        radial-gradient(880px 520px at 84% 88%, rgba(66, 133, 244, 0.44) 0%, transparent 56%),
        radial-gradient(880px 500px at 14% 94%, rgba(34, 211, 238, 0.34) 0%, transparent 58%),
        radial-gradient(640px 340px at 54% 38%, rgba(37, 99, 235, 0.26) 0%, transparent 65%),
        linear-gradient(130deg, var(--login-bg-1) 0%, var(--login-bg-2) 36%, var(--login-bg-3) 72%, var(--login-bg-4) 100%);
      overflow: hidden;
    }

    body.login-page::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(0deg, rgba(255, 255, 255, 0.18), rgba(255, 255, 255, 0.18)),
        repeating-linear-gradient(
          120deg,
          rgba(255, 255, 255, 0.08) 0px,
          rgba(255, 255, 255, 0.08) 2px,
          rgba(255, 255, 255, 0) 2px,
          rgba(255, 255, 255, 0) 12px
        );
      opacity: 0.5;
    }

    .login-shell {
      width: 100%;
      max-width: 460px;
      position: relative;
      z-index: 1;
      animation: fadeUp 0.5s ease;
    }

    .login-card {
      border: 1px solid var(--login-border);
      background: var(--login-card);
      box-shadow: 0 18px 45px rgba(26, 43, 58, 0.18);
      border-radius: 22px;
      padding: 28px 24px;
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
    }

    .login-title {
      font-family: "Sora", sans-serif;
      margin: 0 0 8px;
      font-size: clamp(1.3rem, 2.4vw, 1.7rem);
      letter-spacing: 0.2px;
      color: var(--login-ink);
      text-align: center;
    }

    .login-subtitle {
      margin: 0 0 16px;
      color: var(--login-muted);
      font-size: 0.95rem;
      text-align: center;
    }

    .login-brand {
      display: flex;
      justify-content: center;
      margin-bottom: 12px;
    }

    .login-brand img {
      width: 96px;
      height: 96px;
      object-fit: contain;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.55);
      border: 1px solid rgba(255, 255, 255, 0.65);
      box-shadow: 0 10px 22px rgba(14, 48, 106, 0.2);
      padding: 8px;
    }

    .login-form {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .login-form input {
      height: 46px;
      border-radius: 12px;
      border: 1px solid rgba(177, 198, 192, 0.7);
      background: var(--login-field);
      color: var(--login-ink);
      font-size: 0.95rem;
      transition: border-color 0.18s ease, box-shadow 0.18s ease, background-color 0.18s ease;
    }

    .login-form input::placeholder {
      color: #56716d;
    }

    .login-form input:focus {
      outline: none;
      border-color: #4e83da;
      background: rgba(255, 255, 255, 0.78);
      box-shadow: 0 0 0 4px rgba(78, 131, 218, 0.22);
    }

    .login-btn {
      margin-top: 6px;
      width: 100%;
      height: 46px;
      border: none;
      border-radius: 12px;
      font-weight: 700;
      letter-spacing: 0.2px;
      color: #f6fffd;
      background: linear-gradient(160deg, #1b74f0 0%, var(--login-btn) 56%, #08397f 100%);
      box-shadow: 0 12px 24px rgba(10, 70, 170, 0.42);
      transition: transform 0.16s ease, box-shadow 0.16s ease, filter 0.16s ease;
      cursor: pointer;
    }

    .login-btn:hover {
      background: linear-gradient(160deg, #1663ce 0%, var(--login-btn-hover) 100%);
      box-shadow: 0 16px 26px rgba(10, 55, 122, 0.42);
      transform: translateY(-1px);
      filter: saturate(1.03);
    }

    .login-btn:active {
      transform: translateY(0);
    }

    .login-card .alert {
      border: 1px solid rgba(255, 255, 255, 0.45);
      margin-bottom: 10px;
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 560px) {
      .login-card {
        padding: 22px 16px;
        border-radius: 18px;
      }
    }
  </style>
</head>
<body class="login-page">
  <div class="login-shell">
    <div class="login-card">
      <div class="login-brand">
        <img src="/media/logodounya.png?v=2" alt="Logo DOUNIYA">
      </div>
      <h2 class="login-title">Portail DOUNIYA</h2>
      <p class="login-subtitle">Connecte-toi pour acceder a ton espace de travail.</p>
      {% if messages %}
        {% for message in messages %}
        <div class="alert {% if message.tags == 'success' %}alert-success{% else %}alert-error{% endif %}">{{ message }}</div>
        {% endfor %}
      {% endif %}
      <form method="POST" class="login-form">
        {% csrf_token %}
        <input type="hidden" name="next" value="{{ request.GET.next|default:'' }}">
        <input type="text" name="username" placeholder="Nom d'utilisateur" required>
        <input type="password" name="password" placeholder="Mot de passe" required>
        <button type="submit" class="login-btn">Se connecter</button>
      </form>
    </div>
  </div>
</body>
</html>
