<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Test Paiement</title>
</head>
<body>
  <h4>Méthode de paiement :</h4>
  <label><input type="radio" name="paiement" value="livraison"> Paiement à la livraison</label><br>
  <label><input type="radio" name="paiement" value="cash"> Paiement en cash</label><br>
  <label><input type="radio" name="paiement" value="orange"> Orange Money</label><br>

  <!-- Section cash -->
  <div id="cash-section" style="display:none; margin-top:10px; border:1px solid gray; padding:10px;">
      <label>Montant donné :</label>
      <input type="number" id="montantDonne">
      <p><b>Rendu :</b> <span id="rendu">0</span> FCFA</p>
  </div>

  <script>
  document.addEventListener("DOMContentLoaded", function() {
      const radios = document.querySelectorAll("input[name='paiement']");
      const cashSection = document.getElementById("cash-section");
      const montantInput = document.getElementById("montantDonne");
      const renduSpan = document.getElementById("rendu");

      const totalGeneral = 5000; // fixe pour tester (remplace avec {{ total_general }})

      function calculRendu() {
          const montant = parseFloat(montantInput.value) || 0;
          const rendu = montant - totalGeneral;
          if (rendu >= 0) {
              renduSpan.innerText = rendu;
              renduSpan.style.color = "blue";
          } else {
              renduSpan.innerText = "Reste " + Math.abs(rendu);
              renduSpan.style.color = "red";
          }
      }

      radios.forEach(radio => {
          radio.addEventListener("change", function() {
              if (this.value === "cash") {
                  cashSection.style.display = "block";
                  calculRendu();
              } else {
                  cashSection.style.display = "none";
                  montantInput.value = "";
                  renduSpan.innerText = "0";
              }
          });
      });

      montantInput.addEventListener("input", calculRendu);
  });
  </script>
</body>
</html>
